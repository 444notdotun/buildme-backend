# ============================================================
# BuildMe Backend — application.properties
# ============================================================

spring.application.name=buildme-backend

# Database
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false


# CORS — React frontend
app.cors.allowed-origins=${FRONTEND_URL:*}

# Claude API
app.claude.api-key=${CLAUDE_API_KEY}
app.claude.model=claude-sonnet-4-20250514
app.claude.max-tokens=1000

# Scheduling (enable/disable)
app.scheduling.enabled=${SCHEDULING_ENABLED:true}

# App config
app.name=BuildMe
app.version=1.0.0
app.timezone=Africa/Lagos
